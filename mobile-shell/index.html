<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>Lift Tracker</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111827;
        --bg-2: #1f2937;
        --fg: #f9fafb;
        --muted: #9ca3af;
        --accent: #2563eb;
        --accent-hi: #bfdbfe;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: max(env(safe-area-inset-top), 24px) 24px
          max(env(safe-area-inset-bottom), 24px);
        text-align: center;
        gap: 20px;
      }
      .logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        background: var(--bg-2);
        display: grid;
        place-items: center;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
      .logo svg { width: 64px; height: 64px; }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        max-width: 320px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }
      button {
        margin-top: 12px;
        appearance: none;
        border: 0;
        padding: 14px 28px;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
      .status {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect x="0"  y="9"  width="3"  height="13" fill="#2563eb" />
          <rect x="3"  y="12" width="3"  height="7"  fill="#2563eb" />
          <rect x="6"  y="14" width="2"  height="3"  fill="#2563eb" />
          <rect x="8"  y="15" width="16" height="2"  fill="#bfdbfe" />
          <rect x="24" y="14" width="2"  height="3"  fill="#2563eb" />
          <rect x="26" y="12" width="3"  height="7"  fill="#2563eb" />
          <rect x="29" y="9"  width="3"  height="13" fill="#2563eb" />
        </svg>
      </div>
      <h1>Lift Tracker is offline</h1>
      <p>Reconnect to load your sessions, history, and program. Your local drafts are safe.</p>
      <button id="retry" type="button">Try again</button>
      <div class="status" id="status"></div>
    </main>
    <script>
      (function () {
        var status = document.getElementById("status");
        var btn = document.getElementById("retry");

        function setStatus(t) {
          if (status) status.textContent = t || "";
        }

        function retry() {
          setStatus("Reconnecting…");
          if (navigator.onLine) {
            location.reload();
          } else {
            setStatus("Still offline — check your connection.");
          }
        }

        btn.addEventListener("click", retry);
        window.addEventListener("online", function () {
          setStatus("Back online. Reloading…");
          setTimeout(function () { location.reload(); }, 300);
        });
        window.addEventListener("offline", function () {
          setStatus("Offline.");
        });
      })();
    </script>
  </body>
</html>
